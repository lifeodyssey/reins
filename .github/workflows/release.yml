name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: reins-macos-arm64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: reins-linux-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: reins-windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: cd plugins/reins && bun install

      - name: Build binary
        run: cd plugins/reins && bun build --compile --target=${{ matrix.target }} src/server.ts --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: plugins/reins/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/reins-macos-arm64/*
            dist/reins-linux-x64/*
            dist/reins-windows-x64/*
          body: |
            ## Install

            ### As Claude Code plugin (recommended)
            ```bash
            claude plugin marketplace add lifeodyssey/reins
            claude plugin install reins
            ```

            ### As standalone binary
            Download the binary for your platform below, then:
            ```bash
            chmod +x reins-*     # macOS/Linux
            ./reins-macos-arm64  # or reins-linux-x64, reins-windows-x64.exe
            ```
            Opens http://localhost:7860 with the orchestrator UI.

            **Requires:** [Claude Code CLI](https://claude.ai/code) installed and authenticated.

  publish-npm:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: |
          cd plugins/reins
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
